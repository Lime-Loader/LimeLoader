name: Build and publish melon_data

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    # Required for softprops/action-gh-release to create releases with GITHUB_TOKEN
    # (default token is read-only otherwise -> 403 when creating the release).
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Download Android NDK r26d
        run: |
          mkdir -p $HOME/ndk

          curl -fL \
            -o /tmp/android-ndk-r26d.zip \
            https://dl.google.com/android/repository/android-ndk-r26d-linux.zip

          unzip -q /tmp/android-ndk-r26d.zip -d $HOME/ndk

          echo "ANDROID_NDK_HOME=$HOME/ndk/android-ndk-r26d" >> $GITHUB_ENV

      - name: Verify repository layout
        run: |
          echo "Current directory:"
          pwd

          echo
          echo "Root contents:"
          ls -la

          echo
          echo "All C# projects:"
          find . -name "*.csproj" | sort

          echo
          echo "Rust projects:"
          find . -name "Cargo.toml" | sort


      - name: Build MonoMod (Release)
        shell: bash
        run: |
          set -e

          export PATH="$HOME/.dotnet:$PATH"
          SLN="$(pwd)/"

          find_project()
          {
            local name="$1"
            local result

            result=$(find . -name "$name" -type f | head -n 1 || true)

            if [ -z "$result" ]; then
              echo "ERROR: Missing project: $name"
              find . -name "*.csproj" | sort
              exit 1
            fi

            echo "$result"
          }

          build()
          {
            echo "Building $1"

            dotnet build "$1" \
              -c Release \
              -p:SolutionDir="$SLN"
          }

          RUNTIME_DETOUR=$(find_project "MonoMod.RuntimeDetour.csproj")
          PATCHER=$(find_project "MonoMod.Patcher.csproj")

          build "$RUNTIME_DETOUR"
          build "$PATCHER"


      - name: Build managed loader (Release)
        shell: bash
        run: |
          set -e

          export PATH="$HOME/.dotnet:$PATH"
          SLN="$(pwd)/"

          find_project()
          {
            local name="$1"
            local result

            result=$(find . -name "$name" -type f | head -n 1 || true)

            if [ -z "$result" ]; then
              echo "ERROR: Missing project: $name"
              echo "Available projects:"
              find . -name "*.csproj" | sort
              exit 1
            fi

            echo "$result"
          }

          build()
          {
            echo
            echo "================================"
            echo "Building $1"
            echo "================================"

            dotnet build "$1" \
              -c Release \
              -p:SolutionDir="$SLN" \
              "${@:2}"
          }


          MELONLOADER=$(find_project "MelonLoader.csproj")

          build "$MELONLOADER" -f net8
          build "$MELONLOADER" -f net35


          NATIVEHOST=$(find_project "MelonLoader.NativeHost.csproj")
          build "$NATIVEHOST"


          IL2CPP=$(find_project "Il2Cpp.csproj")
          build "$IL2CPP"


          MONO=$(find_project "Mono.csproj")
          build "$MONO"


          ASSEMBLYGEN=$(find_project "Il2CppAssemblyGenerator.csproj")
          build "$ASSEMBLYGEN"


      - name: Build native bootstrap (arm64)
        shell: bash
        run: |
          set -e

          export ANDROID_NDK_HOME="$HOME/ndk/android-ndk-r26d"
          export PATH="$HOME/.cargo/bin:$PATH"

          # Guarantee the Android std is present regardless of the toolchain action.
          rustup target add aarch64-linux-android

          # Locate the Cargo *workspace* root (the Cargo.toml that declares [workspace]),
          # NOT the Bootstrap member — building the workspace produces BOTH crates:
          #   Rust/Bootstrap  -> libBootstrap.so
          #   Rust/MelonProxy -> libmain.so   (both are needed)
          WORKSPACE_TOML=$(grep -rl "^\[workspace\]" --include=Cargo.toml . | head -n 1 || true)

          if [ -z "$WORKSPACE_TOML" ]; then
            echo "ERROR: No workspace Cargo.toml found"
            find . -name "Cargo.toml" | sort
            exit 1
          fi

          WORKSPACE_DIR=$(dirname "$WORKSPACE_TOML")
          echo "Using Rust workspace: $WORKSPACE_DIR"

          cd "$WORKSPACE_DIR"
          mkdir -p jniLibs

          cargo ndk \
            -t arm64-v8a \
            -o "$(pwd)/jniLibs" \
            build \
            --release

          # libBootstrap.so is dynamically linked against libdobby.so (the Dobby hooking
          # library). dobby-sys ships it as a PREBUILT under its crate checkout and cargo-ndk
          # does NOT copy it, so it must be bundled next to the other .so or libBootstrap.so
          # fails to dlopen at runtime ("library libdobby.so not found").
          DOBBY_SO=$(find "${CARGO_HOME:-$HOME/.cargo}/git/checkouts" \
            -path "*dobby*android/arm64/libdobby.so" 2>/dev/null | head -n 1 || true)

          if [ -z "$DOBBY_SO" ]; then
            echo "ERROR: libdobby.so not found (libBootstrap.so needs it at runtime)"
            find "${CARGO_HOME:-$HOME/.cargo}" -iname "libdobby.so" 2>/dev/null || true
            exit 1
          fi

          mkdir -p jniLibs/arm64-v8a
          cp "$DOBBY_SO" jniLibs/arm64-v8a/
          echo "Bundled libdobby.so from: $DOBBY_SO"

          echo "jniLibs/arm64-v8a:"
          ls -l jniLibs/arm64-v8a


      - name: Fetch .NET 8 Android runtime
        shell: bash
        run: |
          set -e

          # The bootstrap loads a self-contained .NET 8.0.6 android-arm64 CoreCLR runtime
          # from <app>/dotnet at runtime:
          #   dotnet/host/fxr/8.0.6/libhostfxr.so
          #   dotnet/shared/Microsoft.NETCore.App/8.0.6/{libcoreclr.so, libhostpolicy.so, ...}
          # This is a large prebuilt that LemonLoader ships in its release melon_data.zip; its
          # libcoreclr.so is the GC-fixed build (byte-identical to BaseLibs/dotnet_fixed_gc),
          # so we reuse that runtime and then overlay the repo's own GC-fixed libcoreclr so
          # LimeLoader controls the patch.
          RUNTIME_URL="https://github.com/LemonLoader/MelonLoader/releases/download/0.6.5.1/melon_data.zip"

          curl -fL --retry 3 -o /tmp/lemon_melon_data.zip "$RUNTIME_URL"

          rm -rf /tmp/lemon_extract dotnet-runtime
          unzip -q /tmp/lemon_melon_data.zip "dotnet/*" -d /tmp/lemon_extract

          mkdir -p dotnet-runtime
          cp -a /tmp/lemon_extract/dotnet/. dotnet-runtime/

          # Overlay the repo's GC-fixed libcoreclr.so (source of truth for the GC patch).
          GC_CORECLR=$(find . -type f -path "*dotnet_fixed_gc/libcoreclr.so" | head -n 1 || true)
          if [ -n "$GC_CORECLR" ]; then
            cp "$GC_CORECLR" dotnet-runtime/shared/Microsoft.NETCore.App/8.0.6/libcoreclr.so
            echo "Overlaid GC-fixed libcoreclr.so from: $GC_CORECLR"
          fi

          if [ ! -f dotnet-runtime/host/fxr/8.0.6/libhostfxr.so ]; then
            echo "ERROR: dotnet-runtime/host/fxr/8.0.6/libhostfxr.so missing"
            find dotnet-runtime -maxdepth 3 -type d | sort
            exit 1
          fi

          echo "dotnet-runtime ready:"
          find dotnet-runtime -maxdepth 3 -name "libhostfxr.so" -o -maxdepth 3 -name "libcoreclr.so"


      - name: Assemble melon_data.zip
        shell: bash
        run: |
          set -e

          rm -rf melon_data
          mkdir -p melon_data


          echo "Searching for MelonLoader output..."

          LOADER_DIR=$(find . \
            -type d \
            -path "*/Release/MelonLoader" \
            | head -n 1 || true)


          if [ -z "$LOADER_DIR" ]; then
            LOADER_DIR=$(find . \
              -type d \
              -path "*/Debug/MelonLoader" \
              | head -n 1 || true)
          fi


          if [ -z "$LOADER_DIR" ]; then
            echo "ERROR: Could not locate built MelonLoader directory"
            find . -type d | grep -i melon || true
            exit 1
          fi


          echo "Copying:"
          echo "$LOADER_DIR"

          cp -r "$LOADER_DIR" melon_data/MelonLoader


          # Full .NET 8.0.6 runtime prepared by the "Fetch .NET 8 Android runtime" step
          # (host/fxr + shared/Microsoft.NETCore.App). Do NOT use BaseLibs/dotnet_fixed_gc
          # directly here — that folder is only the GC-patched libcoreclr.so plus build-time
          # static (.a) archives, not a loadable runtime (no hostfxr), which makes the
          # bootstrap fail with "Failed to load hostfxr".
          if [ ! -d dotnet-runtime ]; then
            echo "ERROR: dotnet-runtime not found (Fetch .NET 8 Android runtime step must run first)"
            exit 1
          fi

          mkdir -p melon_data/dotnet
          cp -a dotnet-runtime/. melon_data/dotnet/


          # The installer copies *.so DIRECTLY from melon_data/native into lib/arm64-v8a,
          # preserving each file's path relative to native/. So the .so files must sit
          # FLAT in native/, not under an arm64-v8a/ subdir (cargo-ndk nests by ABI, which
          # would otherwise land them at lib/arm64-v8a/arm64-v8a/*.so and fail to load).
          mkdir -p melon_data/native

          if find jniLibs -name '*.so' | grep -q .; then
            find jniLibs -name '*.so' -exec cp {} melon_data/native/ \;
          else
            echo "WARNING: no .so found in jniLibs"
          fi

          echo "melon_data/native:"
          ls -l melon_data/native


          # Bundle the Unity 6 helper assemblies (asset-bundle loading + image conversion,
          # with the Unity 6 _Injected icall fix) plus Newtonsoft.Json into the net8 runtime
          # directory. That dir is MelonEnvironment.OurRuntimeDirectory, which is on the
          # loader's assembly resolve path, so mods can reference these at runtime.
          RUNTIME_DIR=$(find melon_data/MelonLoader -maxdepth 1 -type d -name "net8" | head -n 1 || true)

          if [ -z "$RUNTIME_DIR" ]; then
            RUNTIME_DIR="melon_data/MelonLoader/net8"
            mkdir -p "$RUNTIME_DIR"
          fi

          for dll in \
            UnityEngine.Il2CppAssetBundleManager.dll \
            UnityEngine.Il2CppImageConversionManager.dll \
            Newtonsoft.Json.dll
          do
            if [ -f "BaseLibs/net6/$dll" ]; then
              cp "BaseLibs/net6/$dll" "$RUNTIME_DIR/"
              echo "Bundled $dll -> $RUNTIME_DIR"
            else
              echo "WARNING: BaseLibs/net6/$dll not found"
            fi
          done

          echo "runtime dir ($RUNTIME_DIR):"
          ls -l "$RUNTIME_DIR"


          # Zip from INSIDE melon_data so the archive root holds MelonLoader/ dotnet/ native/
          # directly. The installer extracts straight into its data dir with no wrapper
          # folder, and expects those three at the top level.
          ( cd melon_data && zip -r ../melon_data.zip . )

          ls -lh melon_data.zip


      # Always expose the built payload so manual (workflow_dispatch) runs are useful
      # and downloadable even though they don't cut a release.
      - name: Upload melon_data.zip as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: melon_data
          path: melon_data.zip

      # Only publish a GitHub release when a version tag (v*) is pushed. A manual run
      # has github.ref_name == "main", which would try to create a bogus "main" release.
      - name: Create GitHub release and upload melon_data.zip
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: melon_data.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
