name: Build and publish melon_data

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Download Android NDK r26d
        run: |
          mkdir -p $HOME/ndk
          curl -fL -o /tmp/android-ndk-r26d.zip https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q /tmp/android-ndk-r26d.zip -d $HOME/ndk
          echo "ANDROID_NDK_HOME=$HOME/ndk/android-ndk-r26d" >> $GITHUB_ENV

      - name: Debug checkout
        run: |
          pwd
          ls
          ls LimeLoader/External/MonoMod/src/MonoMod.RuntimeDetour

      - name: Build MonoMod (Release)
        run: |
          export PATH="$HOME/.dotnet:$PATH"

          dotnet build "$(pwd)/LimeLoader/External/MonoMod/src/MonoMod.RuntimeDetour/MonoMod.RuntimeDetour.csproj" \
            -c Release \
            -p:SolutionDir="$(pwd)/LimeLoader/"

          dotnet build "$(pwd)/LimeLoader/External/MonoMod/src/MonoMod.Patcher/MonoMod.Patcher.csproj" \
            -c Release \
            -p:SolutionDir="$(pwd)/LimeLoader/"

      - name: Build managed loader (Release)
        run: |
          export PATH="$HOME/.dotnet:$PATH"
          SLN="$(pwd)/LimeLoader/"

          dotnet build LimeLoader/MelonLoader.csproj \
            -c Release \
            -f net8 \
            -p:SolutionDir="$SLN"

          dotnet build LimeLoader/MelonLoader.csproj \
            -c Release \
            -f net35 \
            -p:SolutionDir="$SLN"

          dotnet build LimeLoader/MelonLoader.NativeHost/MelonLoader.NativeHost.csproj \
            -c Release \
            -p:SolutionDir="$SLN"

          dotnet build LimeLoader/Dependencies/SupportModules/Il2Cpp/Il2Cpp.csproj \
            -c Release \
            -p:SolutionDir="$SLN"

          dotnet build LimeLoader/Dependencies/SupportModules/Mono/Mono.csproj \
            -c Release \
            -p:SolutionDir="$SLN"

          dotnet build LimeLoader/Dependencies/Il2CppAssemblyGenerator/Il2CppAssemblyGenerator.csproj \
            -c Release \
            -p:SolutionDir="$SLN"

      - name: Build native bootstrap (arm64)
        run: |
          export ANDROID_NDK_HOME="$HOME/ndk/android-ndk-r26d"
          export PATH="$HOME/.cargo/bin:$PATH"

          cd LimeLoader/Rust/Bootstrap || cd LimeLoader/Rust
          cargo ndk \
            -t arm64-v8a \
            -o ../../LimeLoader/jniLibs \
            build \
            --release

      - name: Assemble melon_data.zip
        run: |
          cd LimeLoader

          rm -rf melon_data
          mkdir -p melon_data

          if [ -d Output/Release/MelonLoader ]; then
            cp -r Output/Release/MelonLoader melon_data/MelonLoader
          else
            cp -r Output/Debug/MelonLoader melon_data/MelonLoader
          fi

          if [ -d BaseLibs/dotnet_fixed_gc ]; then
            cp -r BaseLibs/dotnet_fixed_gc melon_data/dotnet
          else
            mkdir -p melon_data/dotnet
          fi

          cp -r jniLibs melon_data/native

          zip -r melon_data.zip melon_data
          ls -lh melon_data.zip

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload melon_data.zip to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: LimeLoader/melon_data.zip
          asset_name: melon_data.zip
          asset_content_type: application/zip
