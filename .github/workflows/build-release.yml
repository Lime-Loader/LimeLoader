name: Build and publish melon_data

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Download Android NDK r26d
        run: |
          mkdir -p $HOME/ndk

          curl -fL \
            -o /tmp/android-ndk-r26d.zip \
            https://dl.google.com/android/repository/android-ndk-r26d-linux.zip

          unzip -q /tmp/android-ndk-r26d.zip -d $HOME/ndk

          echo "ANDROID_NDK_HOME=$HOME/ndk/android-ndk-r26d" >> $GITHUB_ENV

      - name: Verify repository layout
        run: |
          echo "Current directory:"
          pwd

          echo
          echo "Root contents:"
          ls -la

          echo
          echo "All C# projects:"
          find . -name "*.csproj" | sort

          echo
          echo "Rust projects:"
          find . -name "Cargo.toml" | sort


      - name: Build MonoMod (Release)
        shell: bash
        run: |
          set -e

          export PATH="$HOME/.dotnet:$PATH"
          SLN="$(pwd)/"

          find_project()
          {
            local name="$1"
            local result

            result=$(find . -name "$name" -type f | head -n 1 || true)

            if [ -z "$result" ]; then
              echo "ERROR: Missing project: $name"
              find . -name "*.csproj" | sort
              exit 1
            fi

            echo "$result"
          }

          build()
          {
            echo "Building $1"

            dotnet build "$1" \
              -c Release \
              -p:SolutionDir="$SLN"
          }

          RUNTIME_DETOUR=$(find_project "MonoMod.RuntimeDetour.csproj")
          PATCHER=$(find_project "MonoMod.Patcher.csproj")

          build "$RUNTIME_DETOUR"
          build "$PATCHER"


      - name: Build managed loader (Release)
        shell: bash
        run: |
          set -e

          export PATH="$HOME/.dotnet:$PATH"
          SLN="$(pwd)/"

          find_project()
          {
            local name="$1"
            local result

            result=$(find . -name "$name" -type f | head -n 1 || true)

            if [ -z "$result" ]; then
              echo "ERROR: Missing project: $name"
              echo "Available projects:"
              find . -name "*.csproj" | sort
              exit 1
            fi

            echo "$result"
          }

          build()
          {
            echo
            echo "================================"
            echo "Building $1"
            echo "================================"

            dotnet build "$1" \
              -c Release \
              -p:SolutionDir="$SLN" \
              "${@:2}"
          }


          MELONLOADER=$(find_project "MelonLoader.csproj")

          build "$MELONLOADER" -f net8
          build "$MELONLOADER" -f net35


          NATIVEHOST=$(find_project "MelonLoader.NativeHost.csproj")
          build "$NATIVEHOST"


          IL2CPP=$(find_project "Il2Cpp.csproj")
          build "$IL2CPP"


          MONO=$(find_project "Mono.csproj")
          build "$MONO"


          ASSEMBLYGEN=$(find_project "Il2CppAssemblyGenerator.csproj")
          build "$ASSEMBLYGEN"


      - name: Build native bootstrap (arm64)
        shell: bash
        run: |
          set -e

          export ANDROID_NDK_HOME="$HOME/ndk/android-ndk-r26d"
          export PATH="$HOME/.cargo/bin:$PATH"

          CARGO_DIR=$(find . -name "Cargo.toml" -type f | grep -i bootstrap | head -n 1 || true)

          if [ -z "$CARGO_DIR" ]; then
            CARGO_DIR=$(find . -name "Cargo.toml" -type f | head -n 1 || true)
          fi

          if [ -z "$CARGO_DIR" ]; then
            echo "ERROR: No Cargo.toml found"
            exit 1
          fi

          echo "Using Rust project: $CARGO_DIR"

          PROJECT_DIR=$(dirname "$CARGO_DIR")

          mkdir -p jniLibs

          cd "$PROJECT_DIR"

          cargo ndk \
            -t arm64-v8a \
            -o "$(pwd)/../../jniLibs" \
            build \
            --release


      - name: Assemble melon_data.zip
        shell: bash
        run: |
          set -e

          rm -rf melon_data
          mkdir -p melon_data


          echo "Searching for MelonLoader output..."

          LOADER_DIR=$(find . \
            -type d \
            -path "*/Release/MelonLoader" \
            | head -n 1 || true)


          if [ -z "$LOADER_DIR" ]; then
            LOADER_DIR=$(find . \
              -type d \
              -path "*/Debug/MelonLoader" \
              | head -n 1 || true)
          fi


          if [ -z "$LOADER_DIR" ]; then
            echo "ERROR: Could not locate built MelonLoader directory"
            find . -type d | grep -i melon || true
            exit 1
          fi


          echo "Copying:"
          echo "$LOADER_DIR"

          cp -r "$LOADER_DIR" melon_data/MelonLoader


          DOTNET_FIXED=$(find . \
            -type d \
            -name "dotnet_fixed_gc" \
            | head -n 1 || true)


          if [ -n "$DOTNET_FIXED" ]; then
            mkdir -p melon_data/dotnet
            cp -r "$DOTNET_FIXED"/* melon_data/dotnet/
          else
            mkdir -p melon_data/dotnet
          fi


          if [ -d jniLibs ]; then
            cp -r jniLibs melon_data/native
          else
            echo "WARNING: jniLibs missing"
          fi


          zip -r melon_data.zip melon_data

          ls -lh melon_data.zip


      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Upload melon_data.zip to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: melon_data.zip
          asset_name: melon_data.zip
          asset_content_type: application/zip
